<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Featured Jobs | Streamline Recruiting</title>
    <style>
        /* Mobile-friendly, adaptive container */
        .job-board-container {
            background: #fff; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-top: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 95%; /* Use 95% of the screen width */
            max-width: 1400px; /* Limits how wide it gets on massive monitors */
            margin-left: auto;
            margin-right: auto;
        }

        /* Adjusts padding for mobile phones */
        @media (max-width: 768px) {
            .job-header h1 { font-size: 2.2rem !important; }
            .job-board-container { width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body class="inner-page">
  <header>
        <div class="logo-wrap">
            <a href="index.html"><img src="SLR Header.png" alt="Streamline Recruiting"></a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="engineering.html">Engineering</a>
            <a href="legal.html">Legal</a>
            <a href="jobs.html">Featured Jobs</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main style="padding: 60px 0;">
        <div class="job-header" style="text-align: center; margin-bottom: 40px; padding: 0 20px;">
            <h1 style="font-size: 3rem; margin-bottom: 15px;">Featured <span style="color:var(--blue)">Jobs.</span></h1>
            <p style="opacity: 0.8; font-size: 1.2rem;">Explore current openings with our partners.</p>
        </div>

        <div class="job-board-container">
            <iframe scrolling="yes" id="recruiterflow-jobs-iframe" 
                    src="https://recruiterflow.com/db_65824b288d1334229391f2b76469bc79/jobs-page-widget" 
                    style="width:100%; border:0; min-height:800px; display:block;">
            </iframe>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.2/iframeResizer.min.js"></script>
        <script>iFrameResize({ log: true, checkOrigin: false }, '#recruiterflow-jobs-iframe')</script>
    </main>

    <footer style="text-align: center; padding: 40px 0; border-top: 1px solid var(--border);">
        <p>© 2026 Streamline Recruiting</p>
    </footer>
</body>
</html>
