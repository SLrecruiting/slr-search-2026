<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact | Streamline Recruiting</title>
</head>
<body>
    <header>
        <div class="logo-wrap"><img src="SLR Header.png" alt="Streamline Recruiting"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="for-employers.html">Hire Talent</a>
            <a href="jobs.html">Featured Jobs</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="container">
        <div style="text-align: center; margin-bottom: 50px;">
            <h1 style="font-size: 3rem;">Let's <span style="color:var(--blue)">Chat</span></h1>
            <p>Ready to move the needle? Reach out below.</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Contact Info</h3>
                <p><strong>Phone:</strong> (425) 818-3962</p>
                <p><strong>Email:</strong> recruitment@slrsearch.com</p>
            </div>

            <div class="card">
                <form action="https://formspree.io/f/YOUR_ID" method="POST">
                    <div>
                        <label>Full Name</label>
                        <input type="text" name="name" required>
                    </div>
                    <div>
                        <label>Email Address</label>
                        <input type="email" name="email" required>
                    </div>
                    <div>
                        <label>Message</label>
                        <textarea name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
