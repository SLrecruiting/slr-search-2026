<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact | Streamline Recruiting</title>
</head>
<body>
    <header>
        <div class="logo-wrap"><img src="SLR Header.png" alt="Streamline Recruiting"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="for-employers.html">Hire Talent</a>
            <a href="jobs.html">Featured Jobs</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <section class="container">
        <div class="glass-box">
            <h1>Start the <span class="accent">Conversation</span></h1>
            <p>Ready to hire or looking for your next career move?</p>
            <form action="#" method="POST" style="margin-top: 30px;">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea rows="6" placeholder="Message"></textarea>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </section>

    <footer><p>© 2026 Streamline Recruiting</p></footer>
</body>
</html>
