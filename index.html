<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline Recruiting | High-Performance Permanent Placement</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RecruitmentAgency",
      "name": "Streamline Recruiting",
      "alternateName": "SLR Search",
      "description": "Specialized permanent placement recruiting agency focused on high-performance talent acquisition and streamlined hiring cycles.",
      "url": "https://www.slrsearch.com",
      "logo": "https://www.slrsearch.com/Logo.jpg"
    }
    </script>

    <style>
        :root {
            --navy: #0a192f;
            --electric-blue: #00d2ff;
            --white: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--navy); color: var(--white); }
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 25, 47, 0.9); position: sticky; top: 0; }
        .hero { padding: 100px 10%; text-align: left; background: linear-gradient(to right, #0a192f, #112240); }
        h1 { font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, var(--electric-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { background: var(--electric-blue); color: var(--navy); padding: 15px 30px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 20px; }
        #jobs-section { padding: 50px 5%; background: white; color: #333; min-height: 600px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><strong>Streamline</strong> Recruiting</div>
    <nav>
        <a href="#jobs" style="color:white; text-decoration:none;">Search Jobs</a>
    </nav>
</header>

<section class="hero">
    <h1>Precision Sourcing.<br>Permanent Impact.</h1>
    <p style="font-size: 1.2rem; max-width: 600px;">Getting off the job boards and into the talent pools. We provide elite permanent placement services with zero friction.</p>
    <a href="#jobs" class="btn">View Open Roles</a>
</section>

<section id="jobs-section">
    <h2 style="text-align:center;">Current Opportunities</h2>
    <p style="text-align:center; color: #666;">Powered by Recruiterflow</p>
    
    <div id="recruiterflow-widget"></div>
</section>

</body>
</html>
